---
name: Changelog

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  fix-changelog:
    if: contains(github.head_ref, 'release-please--branches--main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - id: app-token
        name: Create Vesper Review app token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.VESPER_CLIENT_ID }}
          private-key: ${{ secrets.VESPER_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Fix extra blank line in CHANGELOG.md
        run: |
          # Remove extra blank line after the first version header
          sed -i '/^## \[.*\](.*) (.*)$/{n;/^$/d;}' docs/CHANGELOG.md

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check.outputs.no_changes == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/CHANGELOG.md
          git commit -m "fix: remove extra blank line in changelog"
          git push
