---
# HarperBot Configuration
# This file configures HarperBot's analysis behavior. Modify these settings to customize the bot's performance and output.
# Customize the analysis focus and model

# Analysis focus: 'all', 'security', 'performance', 'quality'
# Options: 'all' for comprehensive review, 'security' for security issues only, 'performance' for optimization suggestions, 'quality' for code quality feedback
focus: all

# Gemini model to use
# Available options: 'gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-2.0-flash', 'gemini-2.5-flash', 'gemini-2.5-pro'
# Recommendations: 'gemini-2.5-flash' for fast, cost-effective analysis; 'gemini-2.5-pro' for higher quality but slower responses
# See https://ai.google.dev/models/gemini for the full list and latest models
model: gemini-2.5-flash

# Maximum diff length to analyze (characters)
# Limits the size of diff content sent to AI. Larger values provide more context but may hit token limits or increase costs
max_diff_length: 4000

# Temperature for generation (0.0 to 1.0)
# Controls randomness in AI responses. Lower values (0.0-0.3) for consistent, focused analysis; higher for more creative suggestions.
temperature: 0.2

# Maximum output tokens
# Maximum length of AI response in tokens. Higher allows more detailed analysis but increases cost.
max_output_tokens: 8192

# Safety settings for AI content filtering
# Configure thresholds: BLOCK_NONE, BLOCK_ONLY_HIGH, BLOCK_MEDIUM_AND_ABOVE, BLOCK_LOW_AND_ABOVE
# See https://ai.google.dev/gemini-api/docs/safety-settings for details
safety_settings:
  - category: HARM_CATEGORY_HARASSMENT
    threshold: BLOCK_NONE
  - category: HARM_CATEGORY_HATE_SPEECH
    threshold: BLOCK_NONE
  - category: HARM_CATEGORY_SEXUALLY_EXPLICIT
    threshold: BLOCK_NONE
  - category: HARM_CATEGORY_DANGEROUS_CONTENT
    threshold: BLOCK_NONE

# Enable code authoring features
# When enabled, HarperBot can create commits, branches, and PRs with improvements
enable_authoring: false

# Auto-commit suggestions to PR branches
# Applies code suggestions directly to the PR's head branch
auto_commit_suggestions: false

# Create improvement PRs
# Generates new PRs with additional improvements beyond the original changes
create_improvement_prs: false

# Branch naming pattern for improvement PRs
# {timestamp} and {pr_number} will be replaced with actual values
improvement_branch_pattern: "harperbot-improvements-{timestamp}"

# Enable RAG (Retrieval Augmented Generation)
# Fetches current information to supplement model's knowledge cutoff
enable_rag: true

# RAG sources to search (space-separated)
# Package Managers: pypi, npm, crates, go, dockerhub, apt, brew, conda, nuget, maven, pub, helm, cocoapods, packagist, rubygems, spm, carthage, pipenv
# Cloud: aws_docs, azure_docs, gcp_docs, terraform_registry, kubernetes, cloudflare, vercel, heroku, digitalocean, linode, fastly
# Serverless: aws_lambda, cloudfunctions, firebase_functions
# Security: security, snyk, github, dependabot, sonarcloud, auth0, clerk, supabase
# Docs/Community: docs, stackoverflow, reddit, hackernews, youtube, arxiv, devto, medium, producthunt, gitbook, confluence, slack, discord, telegram
# Testing: jest, pytest, rspec, cypress, playwright, vitest
# Databases: postgresql, mongodb, redis, prisma, mysql, sqlite, elasticsearch, algolia, meilisearch, memcached, rabbitmq, kafka, pulsar
# API: swagger, graphql, rest, grpc
# CI/CD: github_actions, gitlab_ci, jenkins, circleci, actions
# Monitoring: datadog, newrelic, sentry, prometheus, grafana
# AI/ML: openai, anthropic, cohere, huggingface, kaggle, langchain
# Payments: stripe, paypal, braintree
# Email: sendgrid, mailgun, ses
# Infrastructure: ansible, puppet, packer, vagrant

# RAG sources - 90+ sources available
rag_sources: [
  pypi, npm, crates, go, dockerhub, security, github, docs, stackoverflow,
  news, weather, reddit, hackernews, youtube, arxiv, devto, medium,
  producthunt, apt, brew, conda, nuget, maven, pub, helm, terraform_registry,
  cocoapods, packagist, rubygems, kubernetes, cloudflare, vercel, heroku,
  slack, discord, telegram, jest, pytest, rspec, cypress, playwright, vitest,
  sonarcloud, postgresql, mongodb, redis, prisma, mysql, elasticsearch,
  algolia, meilisearch, rabbitmq, kafka, pulsar, grpc, circleci, actions,
  prometheus, grafana, stripe, paypal, braintree, sendgrid, mailgun, ses,
  ansible, puppet, packer, vagrant, firebase_functions, langchain,
  aws_docs, azure_docs, gcp_docs, huggingface, kaggle,
  auth0, clerk, supabase, openai, anthropic, cohere
]

# GitHub token for RAG (optional, for higher rate limits)
# If not set, will use GITHUB_TOKEN from environment
rag_github_token: ""

# Max items to fetch per RAG source
rag_max_items: 5

# AI analysis prompt template
# Customize the prompt to change how HarperBot analyzes code
prompt: |
  Analyze the following code changes for improvements. Focus on code quality, best practices, performance, and correctness.

  Changed files:
  {files}

  Diff:
  {diff}

  Provide specific code suggestions as diff blocks in the format:
  ```diff
  file_path
  @@ -line_start,count +line_start,count @@
  - old code
  + new code
  ```

  Only suggest changes to lines that are modified in the diff. Suggestions should be actionable and include accurate line numbers from the diff.
