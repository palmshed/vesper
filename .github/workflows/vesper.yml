---
name: Vesper

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  issue_comment:
    types: [created]
  push:
    branches: [main]

# Package versions
env:
  GENERATIVE_AI_VERSION: 0.24.1
  GEMINI_CLI_VERSION: 0.2.2

# Required permissions
permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number ||
    github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: CLI
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Install Gemini CLI
        run: |
          # Install Node.js dependencies with pinned versions from environment
          npm install -g @google/generative-ai@${{ env.GENERATIVE_AI_VERSION }} @google/gemini-cli@${{ env.GEMINI_CLI_VERSION }}

          # Create Gemini CLI wrapper with proper module resolution and version fallback
          cat > /usr/local/bin/gemini-wrapper << 'EOL'
          #!/bin/sh
          NODE_PATH=$(npm root -g) node -e "
          const fs = require('fs');
          const path = require('path');
          const modulePath = require.resolve('@google/generative-ai');
          const pkgPath = path.join(path.dirname(modulePath), 'package.json');
          import(modulePath).then(m => {
            const fallback = fs.existsSync(pkgPath) ? JSON.parse(fs.readFileSync(pkgPath, 'utf8')).version : 'unknown';
            console.log(m.GOOGLE_GENERATIVE_AI_VERSION || fallback);
          }).catch(e => {
            console.error('Error loading @google/generative-ai:', e);
            process.exit(1);
          });"
          EOL

          # Make the script executable
          chmod +x /usr/local/bin/gemini-wrapper

      - name: Verify installation
        run: |
          # Test the installation
          gemini --version
          gemini-wrapper

  bot:
    name: Bot
    if: |
      (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/analyze'))
    runs-on: ubuntu-latest
    container: python:3.11-slim
    timeout-minutes: 10

    steps:
      - name: Install system dependencies
        run: |
          # Install git (required for actions/checkout in container)
          # Note: Node.js removed as the Python bot doesn't require it
          apt-get update && apt-get install -y --no-install-recommends git

      - name: Configure Git
        run: |
          git config --global --add safe.directory /__w/vesper/vesper
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

    # Checkout PR code for analysis
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      # Install Python dependencies required for Vesper
      - name: Install dependencies
        run: |
          # Install pinned Vesper dependencies (direct + transitive) for reproducible runs
          pip install --no-cache-dir -r vesper/requirements.lock

          # Verify installations
          python --version
          pip --version

    # Generate GitHub App token for PR commenting
      - name: Check Vesper secrets
        id: vesper-secrets
        env:
          VESPER_CLIENT_ID: ${{ secrets.VESPER_CLIENT_ID }}
          VESPER_PRIVATE_KEY: ${{ secrets.VESPER_PRIVATE_KEY }}
        run: |
          if [ -n "$VESPER_CLIENT_ID" ] && [ -n "$VESPER_PRIVATE_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Vesper app secrets are not configured; skipping bot run."
          fi

      - name: Generate GitHub App Token
        if: steps.vesper-secrets.outputs.available == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.VESPER_CLIENT_ID }}
          private-key: ${{ secrets.VESPER_PRIVATE_KEY }}

      # Run Vesper to analyze PR with Gemini AI
      - name: Run Gemini PR Bot
        if: steps.vesper-secrets.outputs.available == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Verify installations
          echo "Python: $(python --version)"
          echo "pip: $(pip --version)"

          # Set PR number based on event type
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          # Run the PR bot script with repository and PR number
          python ./vesper/vesper.py \
            --repo ${{ github.repository }} \
            --pr $PR_NUMBER
