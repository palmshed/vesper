---
name: Publish Gem to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.5.0)'
        required: true
        type: string
      skip_tests:
        description: 'Skip tests (use with caution)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Configure Bundler
        run: bundle config set frozen false

      - name: Install dependencies
        run: bundle install

      - name: Run tests
        run: bundle exec ruby test/runner.rb
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  build:
    name: Build Gem
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result != 'failure' || inputs.skip_tests)

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Configure Bundler
        run: bundle config set frozen false

      - name: Install dependencies
        run: bundle install

      - name: Build gem
        run: gem build *.gemspec

      - name: Upload gem artifact
        uses: actions/upload-artifact@v7
        with:
          name: gem-package
          path: "*.gem"

      - name: Debug artifact info
        run: |
          echo "Artifact uploaded successfully"
          ls -la *.gem

  publish-github-packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: build
    if: always()
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download gem artifact
        uses: actions/download-artifact@v8
        with:
          name: gem-package

      - name: Publish to GitHub Packages
        run: |
          mkdir -p ~/.gem
          echo "---" > ~/.gem/credentials
          echo ":github: Bearer ${PACKAGE_TOKEN}" >> ~/.gem/credentials
          chmod 600 ~/.gem/credentials

          # Try to push and handle "already exists" error gracefully
          set +e
          OUTPUT=$(gem push *.gem --host https://rubygems.pkg.github.com/${{ github.repository_owner }} --key github 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "Successfully published gem to GitHub Packages"
          elif echo "$OUTPUT" | grep -q "already been pushed"; then
            echo "Gem version already exists in GitHub Packages. Skipping."
            exit 0
          else
            echo "$OUTPUT"
            exit $EXIT_CODE
          fi
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

  publish-rubygems:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    needs: build
    if: always()
    permissions:
      contents: read

    steps:
      - name: Download gem artifact
        uses: actions/download-artifact@v8
        with:
          name: gem-package

      - name: Check if version exists on RubyGems
        id: check-rubygems
        run: |
          if gem list -r -e friday_gemini_ai | grep -q "${{ inputs.version }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${{ inputs.version }} already exists on RubyGems"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version ${{ inputs.version }} is new, proceeding with publish"
          fi

      - name: Publish to RubyGems
        if: steps.check-rubygems.outputs.exists == 'false'
        run: |
          mkdir -p $HOME/.gem
          touch $HOME/.gem/credentials
          chmod 0600 $HOME/.gem/credentials
          printf -- "---\n:rubygems_api_key: ${RUBYGEMS_API_KEY}\n" > $HOME/.gem/credentials

          if [ -n "${RUBYGEMS_OTP_CODE}" ]; then
            echo "::add-mask::${RUBYGEMS_OTP_CODE}"
            gem push *.gem --otp "${RUBYGEMS_OTP_CODE}"
          else
            gem push *.gem
          fi
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
          RUBYGEMS_OTP_CODE: ${{ secrets.RUBYGEMS_OTP }}
