---
# Vesper Configuration
# This file configures Vesper's analysis behavior. Modify these settings to customize the bot's performance and output.
# Customize the analysis focus and model

# Analysis focus: 'all', 'security', 'performance', 'quality'
# Options: 'all' for full review, 'security' for security issues only, 'performance' for performance suggestions, 'quality' for code quality feedback
focus: all

# Gemini model to use
# Default: 'gemini-3.5-flash'
# Use VESPER_GEMINI_MODEL to override the default in hosted environments.
# See https://ai.google.dev/models/gemini for the full list and latest models
model: gemini-3.5-flash

# Maximum diff length to analyze (characters)
# Limits the size of diff content sent to AI. Larger values provide more context but may hit token limits or increase costs
max_diff_length: 4000

# Temperature for generation (0.0 to 1.0)
# Controls randomness in AI responses. Lower values (0.0-0.3) for consistent, focused analysis; higher for more creative suggestions.
temperature: 0.2

# Maximum output tokens
# Maximum length of AI response in tokens. Higher allows more detailed analysis but increases cost.
max_output_tokens: 8192

# Safety settings for AI content filtering
# Configure thresholds: BLOCK_NONE, BLOCK_ONLY_HIGH, BLOCK_MEDIUM_AND_ABOVE, BLOCK_LOW_AND_ABOVE
# See https://ai.google.dev/gemini-api/docs/safety-settings for details
safety_settings:
  - category: HARM_CATEGORY_HARASSMENT
    threshold: BLOCK_NONE
  - category: HARM_CATEGORY_HATE_SPEECH
    threshold: BLOCK_NONE
  - category: HARM_CATEGORY_SEXUALLY_EXPLICIT
    threshold: BLOCK_NONE
  - category: HARM_CATEGORY_DANGEROUS_CONTENT
    threshold: BLOCK_NONE

# Enable code authoring features
# When enabled, Vesper can create commits, branches, and PRs with improvements
enable_authoring: true

# Auto-commit suggestions to PR branches
# Applies code suggestions directly to the PR's head branch
auto_commit_suggestions: false

# Create improvement PRs
# Generates new PRs with additional improvements beyond the original changes
create_improvement_prs: false

# Branch naming pattern for improvement PRs
# {timestamp} and {pr_number} will be replaced with actual values
improvement_branch_pattern: "vesper-improvements-{timestamp}"

# Optional retrieval context. Disabled by default to keep reviews fast and predictable.
enable_rag: false
rag_sources: [pypi, npm, rubygems, security, github, docs]

# GitHub token for RAG (optional, for higher rate limits)
# If not set, will use GITHUB_TOKEN from environment
rag_github_token: ""

# Max items to fetch per RAG source when RAG is enabled
rag_max_items: 3

# AI analysis prompt template
# Customize the prompt to change how Vesper analyzes code
prompt: |
  Analyze the following code changes. Focus on code quality, security, performance, and correctness.

  Changed files:
  {files}

  Diff:
  {diff}

  Provide specific code suggestions as diff blocks in the format:
  ```diff
  file_path
  @@ -line_start,count +line_start,count @@
  - old code
  + new code
  ```

  Only suggest changes to lines that are modified in the diff. Suggestions should be actionable and include accurate line numbers from the diff.
